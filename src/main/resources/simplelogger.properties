# slf4j-simple 설정 (logback 대체)
# 출력: System.err (콘솔)
# 파일 로그가 필요하면 OS 리다이렉트 사용:
#   java -jar redmine2github.jar ... 2>&1 | tee migration.log  (macOS/Linux)
#   java -jar redmine2github.jar ... 2>&1 | Tee-Object migration.log  (PowerShell)

org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.logFile=System.err
